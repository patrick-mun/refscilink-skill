<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Références bibliographiques</title>
  <link rel="stylesheet" href="./assets/css/reference.css" />
</head>
<body>
  <!-- RefSciLink bibliography index page. Behaviour is provided by assets/js/reference.js. -->
  <main class="refscilink-page" data-refscilink-page="index">
    <!-- Header keeps navigation back to the host website separate from dynamic reference content. -->
    <header class="refscilink-header">
      <a class="refscilink-back-link" href="../../index.html" data-refscilink-back-link>Retour au site</a>
      <h1 class="refscilink-title" data-refscilink-title>Références bibliographiques</h1>
      <p class="refscilink-subtitle" data-refscilink-subtitle>
        Sources scientifiques associées au projet, avec statut d’accès et validation humaine.
      </p>
    </header>

    <!-- Search and filters expose stable data hooks for the JavaScript engine. -->
    <section class="refscilink-controls" aria-label="Filtres bibliographiques">
      <div class="refscilink-control-group">
        <label class="refscilink-label" for="refscilink-search">Rechercher</label>
        <input class="refscilink-input" id="refscilink-search" type="search" placeholder="Titre, auteur, journal, DOI…" data-refscilink-search />
      </div>
      <div class="refscilink-control-group">
        <label class="refscilink-label" for="refscilink-theme-filter">Thème</label>
        <select class="refscilink-select" id="refscilink-theme-filter" data-refscilink-theme-filter>
          <option value="all">Tous les thèmes</option>
        </select>
      </div>
      <div class="refscilink-control-group">
        <label class="refscilink-label" for="refscilink-validation-filter">Validation</label>
        <select class="refscilink-select" id="refscilink-validation-filter" data-refscilink-validation-filter>
          <option value="all">Tous les statuts</option>
          <option value="pending_validation">À valider</option>
          <option value="validated">Validé</option>
          <option value="needs_revision">À réviser</option>
          <option value="rejected">Rejeté</option>
        </select>
      </div>
      <div class="refscilink-control-group">
        <label class="refscilink-label" for="refscilink-access-filter">Accès</label>
        <select class="refscilink-select" id="refscilink-access-filter" data-refscilink-access-filter>
          <option value="all">Tous les accès</option>
          <option value="open_access">Open access</option>
          <option value="abstract_only">Résumé seul</option>
          <option value="accepted_author_version">Version auteur</option>
          <option value="preprint">Preprint</option>
          <option value="paywalled">Paywall</option>
          <option value="unknown">Inconnu</option>
        </select>
      </div>
    </section>

    <!-- Dynamic counters and states are updated without replacing the page structure. -->
    <section class="refscilink-summary" aria-live="polite">
      <p class="refscilink-count" data-refscilink-count></p>
    </section>

    <section class="refscilink-state-area" aria-live="polite">
      <p class="refscilink-loading" data-refscilink-loading>Chargement des références…</p>
      <p class="refscilink-empty" data-refscilink-empty hidden>Aucune référence trouvée.</p>
      <p class="refscilink-error" data-refscilink-error role="alert" hidden></p>
    </section>

    <!-- Reference cards are created by reference.js from the JSON data. -->
    <section class="refscilink-list" id="refscilink-reference-list" data-refscilink-list></section>

    <template id="refscilink-reference-template">
      <article class="refscilink-reference-card" data-refscilink-reference-card></article>
    </template>
  </main>

  <script src="./assets/js/reference.js"></script>
</body>
</html>
