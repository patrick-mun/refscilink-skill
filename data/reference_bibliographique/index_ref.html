<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Références bibliographiques</title>
  <link rel="stylesheet" href="assets/css/reference.css">
</head>
<body>
  <main class="ref-page">
    <header class="ref-hero">
      <p class="eyebrow">Bibliographie scientifique</p>
      <h1>Références bibliographiques</h1>
      <p>Liste des sources scientifiques associées à cette présentation, avec accès aux résumés détaillés et au statut de validation.</p>
    </header>

    <section class="ref-toolbar" aria-label="Filtres bibliographiques">
      <input id="refSearch" type="search" placeholder="Rechercher un titre, auteur, DOI, thème…">
      <select id="themeFilter"><option value="all">Tous les thèmes</option></select>
      <select id="validationFilter">
        <option value="all">Tous les statuts</option>
        <option value="valide">Validé</option>
        <option value="a_valider">Non validé</option>
        <option value="a_corriger">À corriger</option>
      </select>
    </section>

    <section id="referencesList" class="references-list" aria-live="polite"></section>
  </main>

  <template id="referenceCardTemplate">
    <article class="ref-card">
      <div class="ref-card-head">
        <span class="ref-number"></span>
        <span class="ref-theme"></span>
        <span class="ref-access"></span>
        <span class="ref-validation"></span>
      </div>
      <h2 class="ref-title"></h2>
      <p class="ref-meta"></p>
      <p class="ref-short"></p>
      <div class="ref-actions">
        <button class="read-summary">Lire le résumé</button>
        <a class="view-source" target="_blank" rel="noopener">Voir la source</a>
        <button class="copy-reference">Copier la référence</button>
        <button class="validate-reference">Valider le résumé</button>
      </div>
      <section class="ref-summary" hidden></section>
    </article>
  </template>

  <script src="assets/js/reference.js"></script>
</body>
</html>
